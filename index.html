<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Offline - OurCommons|Markets</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <div class="container" id="status-card">
        <div class="badge">
            <span class="status-dot"></span>
            Maintenance Mode
        </div>

        <div class="logo-container">
            <img class="logo" src="/logo.svg" alt="OurCommons Logo">
        </div>

        <h1>OurCommons | Markets</h1>

        <div class="message-box">
            <p>OurCommons|Markets is currently offline.</p>
            <p>That likely means we are doing an update but could mean a power outage or any number of events have occurred.</p>
            
            <div id="dynamic-notice" style="margin: 1rem 0; padding: 1rem; background: rgba(16, 185, 129, 0.08); border-radius: 8px; display: none;">
                <h3 id="notice-heading" style="color: var(--primary); margin-bottom: 0.5rem; font-weight: 600;"></h3>
                <p id="notice-details" style="font-size: 0.95rem; line-height: 1.5; margin: 0;"></p>
            </div>
        
            <p class="emphasis">Please be patient, we are doing our best. Thank you.</p>
        </div>

        <div class="meta-info">
            <span>&copy; <span id="year"></span> OurCommons</span>
            <a href="https://github.com/JFL1109/OurCommons" class="meta-link" target="_blank" rel="noopener noreferrer">
                Visit Repository <i data-lucide="external-link" style="width: 14px; height: 14px; display: inline-block; vertical-align: middle;"></i>
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initialize icons
        lucide.createIcons();

        // Update year dynamically
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
